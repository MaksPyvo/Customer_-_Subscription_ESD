{% extends "base.html" %}
{% block title %}Login | F2F{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
 
    <div class="auth-brand auth-brand-center">
      <img src="/static/images/f2f_logo_white.png" alt="Farm2Fork logo">
    </div>
 
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Log in with your Community Food Partners account.</p>
 
    {% if error %}
       <div class="auth-message" style="color: red; margin-bottom: 15px;">{{ error }}</div>
    {% endif %}
 
    <form class="auth-form" method="POST" action="/login">
 
      <label class="label" for="username">ID</label>
      <input class="input" type="text" id="username" name="username" placeholder="Enter your ID" required>
 
      <label class="label" for="password">Mobile</label>
      <input class="input" type="password" id="password" name="password" placeholder="Enter your mobile number" required>
 
      <button class="btn btn-block" type="submit">Log In</button>
 
    </form>
  </div>
</div>
{% endblock %}
